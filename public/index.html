<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>UB-STUDIOZ | Global Cloud Access</title>
    <!-- Load your central API SDK -->
    <script src="https://ubstudioz.duckdns.org/ub-cloud-api.js"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="/config.js"></script>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 0;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 100%;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px 40px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            padding: 20px 30px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #94a3b8;
        }

        .breadcrumb span {
            cursor: pointer;
            transition: color 0.2s;
        }

        .breadcrumb span:hover {
            color: #6366f1;
        }

        .breadcrumb .active {
            color: #f8fafc;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .btn-secondary {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            margin-left: 8px;
            font-weight: 500;
            transition: 0.2s;
        }

        .search-container {
            flex-grow: 1;
            margin: 0 30px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 10px 15px;
            border-radius: 10px;
            color: white;
            outline: none;
        }

        .search-container input:focus { border-color: #6366f1; }

        .file-list {
            background: #1e293b;
            border-radius: 16px;
            border: 1px solid #334155;
            overflow-y: auto;
            flex-grow: 1;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid #334155;
            transition: all 0.2s;
            cursor: pointer;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item:hover {
            background: #33415533;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-grow: 1;
        }

        .file-cb {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #6366f1;
        }

        .file-icon {
            font-size: 1.4rem;
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            overflow: hidden;
        }

        .file-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .file-name {
            font-size: 1rem;
            color: #e2e8f0;
        }

        .actions {
            display: flex;
            gap: 15px;
            opacity: 0.3;
            transition: opacity 0.2s;
        }

        .file-item:hover .actions {
            opacity: 1;
        }

        .actions span {
            font-size: 1.1rem;
            transition: transform 0.2s;
            padding: 5px;
        }

        .actions span:hover {
            transform: scale(1.2);
            color: #6366f1;
        }

        #modal,
        #previewModal,
        #infoModal,
        #reviewModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2000;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            border: 1px solid #4f46e5;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .preview-content {
            width: 100vw;
            height: 100vh;
            background: #0f172a;
            border-radius: 0;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: none;
        }

        .preview-header {
            padding: 15px 25px;
            background: #1e293b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .preview-body {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            overflow: hidden;
        }

        .preview-body video,
        .preview-body .plyr {
            width: 100% !important;
            height: 100% !important;
            max-width: none;
            border-radius: 0;
            box-shadow: none;
        }
        
        .selection-badge {
            background: #6366f1;
            color: white;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            margin-right: 8px;
        }

        /* Video Editing Tools Styling */
        .video-edit-bar {
            background: #1e293b;
            padding: 15px 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #334155;
        }

        .edit-btn {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .edit-btn:hover {
            background: #475569;
            border-color: #6366f1;
        }

        .edit-btn.active {
            background: rgba(99, 102, 241, 0.2);
            border-color: #6366f1;
            color: #818cf8;
        }

        .save-copy-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
        }

        .save-copy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #334155;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #94a3b8; font-weight: 500; }
        .info-value { color: #f8fafc; text-align: right; }

        .bulk-bar {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #6366f1;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 1500;
            align-items: center;
            gap: 20px;
        }

        .bulk-actions {
            display: flex;
            gap: 15px;
        }
        .bulk-btn {
            background: white;
            color: #6366f1;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
        }

        .drop-zone {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(99, 102, 241, 0.4);
            border: 5px dashed #6366f1;
            z-index: 3000;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        .studio-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            background: #33415533;
            padding: 20px;
            border-radius: 12px;
        }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .control-group label { font-size: 0.85rem; color: #94a3b8; }
        .control-group input { 
            background: #0f172a; border: 1px solid #475569; color: white; padding: 10px; border-radius: 6px; outline: none;
        }
        .control-group input:focus { border-color: #6366f1; }
    </style>
</head>

<body>
    <div id="dropZone" class="drop-zone">🚀 Release to Upload</div>

    <div class="container">
        <div class="header">
            <div class="breadcrumb" id="breadcrumb" style="flex-shrink: 0;">
                <span onclick="navigateTo('')">📁 Root</span>
            </div>
            
            <div class="search-container">
                <input type="text" id="searchBar" placeholder="🔍 Search files..." oninput="handleSearch()">
            </div>

            <div style="display:flex; align-items: center;">
                <button class="btn-primary" onclick="document.getElementById('fileInput').click()">+ Upload</button>
                <button class="btn-secondary" onclick="createNew('folder')">+ New Folder</button>
                <button class="btn-secondary" id="trashButton" onclick="toggleTrash()">🗑️ Trash</button>
                <input type="file" id="fileInput" style="display:none" onchange="uploadFile()" multiple>
            </div>
        </div>

        <div class="file-list" id="explorer"></div>
    </div>

    <!-- Bulk Action Bar -->
    <div class="bulk-bar" id="bulkBar">
        <span id="bulkCount">0 items selected</span>
        <div class="bulk-actions">
            <button class="bulk-btn" id="bulkRestoreBtn" style="display:none; background: #10b981; color: white;" onclick="bulkRestore()">♻️ Restore</button>
            <button class="bulk-btn" id="bulkMergeBtn" style="display:none; background: #6366f1; color: white;" onclick="executeMerge(false)">🎬 Merge Selected</button>
            <button class="bulk-btn" id="bulkMergeAllBtn" style="display:none; background: #4f46e5; color: white;" onclick="executeMerge(true)">📂 Merge All</button>
            <button class="bulk-btn" id="bulkCopyBtn" onclick="bulkAction('copy')">📋 Copy</button>
            <button class="bulk-btn" id="bulkMoveBtn" onclick="bulkAction('move')">🚚 Move</button>
            <button class="bulk-btn" onclick="bulkAction('delete')" style="color: #ef4444;">🗑️ Delete</button>
            <button class="bulk-btn" id="bulkEmptyBtn" style="display:none; background: #ef4444; color: white;" onclick="emptyTrash()">💥 Empty</button>
            <button class="bulk-btn" onclick="clearSelection()" style="background:transparent; color:white; border: 1px solid white;">✕ Clear</button>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal">
        <div class="modal-content">
            <h3 style="margin-top:0">Rename Item</h3>
            <input type="text" id="newNameInput">
            <div style="display:flex; justify-content: flex-end; gap: 10px;">
                <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" id="confirmRename">Save</button>
            </div>
        </div>
    </div>

    <div id="infoModal">
        <div class="modal-content" style="width: 450px;">
            <h3 style="margin-top:0">Item Properties</h3>
            <div id="infoDetails"></div>
            <div style="display:flex; justify-content: flex-end; margin-top: 20px;">
                <button class="btn-primary" onclick="document.getElementById('infoModal').style.display='none'">Close</button>
            </div>
        </div>
    </div>

    <!-- Processing Form (No Previews) -->
    <div id="reviewModal">
        <div class="modal-content" style="width: 450px; border-color: #10b981;">
            <h3 style="margin-top:0; color: #10b981;">⚙️ Media Processing Options</h3>
            <p id="reviewMeta" style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px;"></p>
            
            <div class="studio-controls">
                <!-- Target File Size -->
                <div class="control-group">
                    <div style="display:flex; align-items: center; gap: 10px; margin-bottom: 5px;">
                        <input type="checkbox" id="enableSizing" checked style="width: 20px; height: 20px;">
                        <label for="enableSizing" style="color:white; font-size: 1rem; cursor: pointer;">Target File Size (MB)</label>
                    </div>
                    <input type="number" id="targetMb" value="1" step="0.1" min="0.1" style="width: 100%;">
                </div>

                <!-- Watermark Text -->
                <div class="control-group">
                    <div style="display:flex; align-items: center; gap: 10px; margin-bottom: 5px;">
                        <input type="checkbox" id="enableWatermark" checked style="width: 20px; height: 20px;">
                        <label for="enableWatermark" style="color:white; font-size: 1rem; cursor: pointer;">Watermark Text</label>
                    </div>
                    <input type="text" id="watermarkText" value="UB-STUDIOZ" style="width: 100%;">
                </div>

                <!-- Thumbnail -->
                <div class="control-group" style="flex-direction: row; align-items: center; gap: 10px; margin-top: 5px;">
                    <input type="checkbox" id="showThumb" checked style="width: 20px; height: 20px;">
                    <label style="color:white; font-size: 1rem; cursor: pointer;" for="showThumb">Add Thumbnail</label>
                </div>
            </div>

            <div style="display:flex; justify-content: flex-end; align-items: center; gap: 15px; margin-top: 10px;">
                <button class="btn-secondary" onclick="document.getElementById('reviewModal').style.display='none'">Ignore</button>
                <button class="btn-primary" style="background: #10b981;" onclick="processAndFinish()">Process & Save</button>
            </div>
        </div>
    </div>

    <div id="previewModal">
        <div class="preview-content">
            <div class="preview-header">
                <h3 id="previewTitle" style="margin:0">File Preview</h3>
                <div style="display:flex; gap: 10px;">
                    <button id="saveBtn" class="btn-primary" style="display:none; background: #059669;" onclick="saveFile()">💾 Save</button>
                    <button class="close-preview" onclick="closePreview()">✕</button>
                </div>
            </div>
            <div class="preview-body" id="previewBody"></div>
        </div>
    </div>

    <script>
        const cloud = new UBCloud(window.UB_CONFIG?.apiKey || "your-secret-key-here");
        let currentPath = "";
        let allFiles = [];
        let clipboard = null;
        let selectedFiles = []; // Changed to array to track order
        let inTrash = false;

        // --- LIFECYCLE NOTIFICATIONS ---
        cloud.notifyVisit();
        window.addEventListener('beforeunload', () => cloud.notifyExit());

        // --- DRAG & DROP ---
        window.addEventListener('dragover', (e) => { e.preventDefault(); document.getElementById('dropZone').style.display = 'flex'; });
        window.addEventListener('dragleave', (e) => { if (!e.relatedTarget) document.getElementById('dropZone').style.display = 'none'; });
        window.addEventListener('drop', async (e) => {
            e.preventDefault();
            document.getElementById('dropZone').style.display = 'none';
            for (const f of e.dataTransfer.files) await cloud.upload(f, currentPath);
            loadFiles();
        });

        async function loadFiles() {
            try {
                allFiles = await cloud.listFiles(inTrash ? ".trash" : currentPath);
                renderFiles(allFiles);
                updateBreadcrumb();
                updatePasteButton();
                clearSelection();
            } catch (err) { console.error("SDK Error:", err); }
        }

        function toggleTrash() {
            inTrash = !inTrash;
            const btn = document.getElementById('trashButton');
            btn.innerText = inTrash ? "🔙 Back" : "🗑️ Trash";
            btn.style.background = inTrash ? "#6366f1" : "transparent";
            loadFiles();
        }

        function renderFiles(files) {
            const container = document.getElementById('explorer');
            if (files.length === 0) {
                container.innerHTML = `<div style="padding: 40px; text-align: center; color: #64748b;">${inTrash ? 'Trash is empty' : 'No files found'}</div>`;
                return;
            }

            container.innerHTML = files.map(f => {
                const ext = f.name.split('.').pop().toLowerCase();
                const isImg = ['jpg', 'jpeg', 'png', 'webp', 'gif'].includes(ext);
                const isVid = ['mp4', 'webm', 'mkv', 'mov'].includes(ext);
                const iconContent = f.isFolder ? '📂' : (isImg ? `<img src="${cloud.getViewUrl(f.name, inTrash?'.trash':currentPath)}&w=40&h=40" alt="thumb">` : getFileIcon(f.name));
                
                const selIndex = selectedFiles.indexOf(f.name);
                const badge = selIndex > -1 ? `<span class="selection-badge">[${selIndex + 1}]</span>` : '';

                return `
                <div class="file-item" onclick="handleItemClick(event, '${f.name.replace(/'/g, "\\'")}', ${f.isFolder})">
                    <div class="file-info">
                        <input type="checkbox" class="file-cb" ${selIndex > -1 ? 'checked' : ''} onclick="event.stopPropagation(); toggleSelect('${f.name.replace(/'/g, "\\'")}')">
                        <span class="file-icon">${iconContent}</span>
                        <span class="file-name">${badge}${f.name} ${f.hasHLS ? '<span style="background:#6366f1; font-size:0.7rem; padding:2px 6px; border-radius:4px; margin-left:5px;">HLS</span>' : ''}</span>
                    </div>
                    <div class="actions">
                        <span title="Properties" onclick="event.stopPropagation(); showInfo(${JSON.stringify(f).replace(/"/g, '&quot;')})">ℹ️</span>
                        ${inTrash ? '' : `
                            ${isVid && !f.hasHLS ? `<span title="Transcode for Streaming" onclick="event.stopPropagation(); startTranscode('${f.name.replace(/'/g, "\\'")}')">⚡</span>` : ''}
                            <span title="Copy" onclick="event.stopPropagation(); setSingleClipboard('${f.name.replace(/'/g, "\\'")}', 'copy')">📋</span>
                            <span title="Rename" onclick="event.stopPropagation(); openRename('${f.name.replace(/'/g, "\\'")}')">✏️</span>
                        `}
                        <span title="Delete" onclick="event.stopPropagation(); deleteItem('${f.name.replace(/'/g, "\\'")}')">🗑️</span>
                    </div>
                </div>
            `}).join('');
        }

        function handleSearch() {
            const val = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allFiles.filter(f => f.name.toLowerCase().includes(val));
            renderFiles(filtered);
        }

        function toggleSelect(name) { 
            const index = selectedFiles.indexOf(name);
            if (index > -1) selectedFiles.splice(index, 1); 
            else selectedFiles.push(name); 
            renderFiles(allFiles); // Re-render to update badges
            updateBulkBar(); 
        }

        function updateBulkBar() {
            const bar = document.getElementById('bulkBar');
            bar.style.display = selectedFiles.length > 0 ? 'flex' : 'none';
            document.getElementById('bulkCount').innerText = `${selectedFiles.length} items selected`;
            
            // Toggle visibility based on directory
            const isCutFolder = currentPath === 'cut' || currentPath.endsWith('/cut');
            const mergeBtn = document.getElementById('bulkMergeBtn');
            const mergeAllBtn = document.getElementById('bulkMergeAllBtn');
            
            if (mergeBtn) mergeBtn.style.display = (isCutFolder && selectedFiles.length > 1) ? 'block' : 'none';
            if (mergeAllBtn) mergeAllBtn.style.display = isCutFolder ? 'block' : 'none';

            document.getElementById('bulkRestoreBtn').style.display = inTrash ? 'block' : 'none';
            document.getElementById('bulkEmptyBtn').style.display = inTrash ? 'block' : 'none';
            document.getElementById('bulkCopyBtn').style.display = inTrash ? 'none' : 'block';
            document.getElementById('bulkMoveBtn').style.display = inTrash ? 'none' : 'block';
        }
        function clearSelection() { selectedFiles = []; updateBulkBar(); renderFiles(allFiles); }

        async function bulkRestore() {
            const names = Array.from(selectedFiles);
            await cloud.move(names, ".trash", currentPath, true);
            loadFiles();
        }

        async function emptyTrash() { if (confirm("Permanently wipe the trash?")) { await cloud._request('/api/trash/empty', 'POST'); loadFiles(); } }

        async function uploadFile() {
            const input = document.getElementById('fileInput');
            if (!input.files[0]) return;
            const file = input.files[0];
            try {
                const res = await cloud.upload(file, currentPath);
                const serverFilename = res.file; // Use the returned server filename
                const ext = serverFilename.split('.').pop().toLowerCase();
                const isImg = ['jpg', 'jpeg', 'png', 'webp', 'gif'].includes(ext);
                
                if (isImg) {
                    openProcessingForm(serverFilename, file.size);
                } else {
                    alert('Upload complete!');
                }
                input.value = ''; 
                loadFiles();
            } catch (err) {
                alert("Upload failed: " + err.message);
            }
        }

        let processingFilename = "";

        function openProcessingForm(name, size) {
            processingFilename = name;
            document.getElementById('reviewMeta').innerText = `Process: ${name} (${formatSize(size)})`;
            document.getElementById('reviewModal').style.display = 'flex';
        }

        async function processAndFinish() {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "⏳ Processing...";
            btn.disabled = true;

            const options = {
                targetMb: document.getElementById('enableSizing').checked ? document.getElementById('targetMb').value : null,
                watermarkText: document.getElementById('enableWatermark').checked ? document.getElementById('watermarkText').value : null,
                addThumbnail: document.getElementById('showThumb').checked
            };

            try {
                const res = await cloud.processImage(processingFilename, currentPath, options);
                alert(`Success! Size reduced from ${res.originalSize} to ${res.newSize}`);
                document.getElementById('reviewModal').style.display = 'none';
                loadFiles();
            } catch (err) {
                alert("Processing failed: " + err.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
        
        function handleItemClick(e, name, isFolder) {
            if (e.target.classList.contains('file-cb')) return;
            if (isFolder) { currentPath = currentPath ? `${currentPath}/${name}` : name; loadFiles(); }
            else openPreview(name);
        }

        function formatSize(bytes) { if (bytes === 0) return '0 B'; const k = 1024, sizes = ['B', 'KB', 'MB', 'GB']; const i = Math.floor(Math.log(bytes) / Math.log(k)); return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i]; }
        function navigateTo(path) { currentPath = path; inTrash = false; document.getElementById('trashButton').innerText = "🗑️ Trash"; clearSelection(); loadFiles(); }
        function getFileIcon(n) { const e = n.split('.').pop().toLowerCase(); const i = { 'mp4': '🎬', 'mp3': '🎵', 'pdf': '📕', 'zip': '📦' }; return i[e] || '📄'; }
        function updateBreadcrumb() {
            const b = document.getElementById('breadcrumb');
            let h = `<span onclick="navigateTo('')">📁 Root</span>`;
            if (currentPath) {
                const parts = currentPath.split('/');
                let t = "";
                parts.forEach((p, i) => { t += (i === 0 ? p : '/' + p); h += ` <span style="color:#475569">/</span> <span class="${i === parts.length - 1 ? 'active' : ''}" onclick="navigateTo('${t.replace(/'/g, "\\'")}')">${p}</span>`; });
            }
            b.innerHTML = h;
        }

        function setSingleClipboard(name, action) { clipboard = { names: [name], path: currentPath, action }; updatePasteButton(); }
        function updatePasteButton() {
            const h = document.querySelector('.header > div:last-child');
            let p = document.getElementById('pasteBtn');
            if (clipboard) {
                if (!p) { p = document.createElement('button'); p.id = 'pasteBtn'; p.className = 'btn-primary'; p.style.background = '#10b981'; p.style.marginLeft = '8px'; p.onclick = executePaste; h.appendChild(p); }
                p.innerHTML = `Paste (${clipboard.names.length})`;
            } else if (p) p.remove();
        }

        async function executePaste() {
            if (!clipboard) return;
            try {
                if (clipboard.action === 'copy') await cloud.copy(clipboard.names, clipboard.path, currentPath);
                else await cloud.move(clipboard.names, clipboard.path, currentPath);
                clipboard = null; loadFiles();
            } catch (err) { alert("Paste failed: " + err.message); }
        }

        async function createNew(type) { const n = prompt(`Enter ${type} name:`); if (n) await cloud.create(type, n.trim(), currentPath); loadFiles(); }
        async function deleteItem(n) {
            const msg = inTrash ? `Permanently delete ${n}?` : `Move ${n} to trash?`;
            if (confirm(msg)) { await cloud.delete(n, inTrash ? '.trash' : currentPath); loadFiles(); }
        }

        function openRename(n) {
            const oldN = n;
            const newN = prompt("New name:", n);
            if (newN && newN !== oldN) { cloud.rename(oldN, newN, currentPath).then(() => loadFiles()); }
        }

        function showInfo(f) {
            const details = document.getElementById('infoDetails');
            details.innerHTML = `
                <div class="info-row"><span class="info-label">Name</span><span class="info-value">${f.name}</span></div>
                <div class="info-row"><span class="info-label">Size</span><span class="info-value">${f.isFolder ? '--' : formatSize(f.size)}</span></div>
                <div class="info-row"><span class="info-label">Created</span><span class="info-value">${new Date(f.created).toLocaleString()}</span></div>
                <div class="info-row"><span class="info-label">Modified</span><span class="info-value">${new Date(f.modified).toLocaleString()}</span></div>
            `;
            document.getElementById('infoModal').style.display = 'flex';
        }

        async function bulkAction(action) {
            const names = selectedFiles;
            if (action === 'delete') {
                const msg = inTrash ? "Permanently delete these items?" : "Move these items to trash?";
                if (!confirm(msg)) return;
                await cloud.delete(names, inTrash ? '.trash' : currentPath);
                loadFiles();
            } else {
                clipboard = { names, path: currentPath, action };
                alert(`${names.length} items added to clipboard.`);
                updatePasteButton();
            }
        }

        async function executeMerge(mergeAll) {
            const names = mergeAll ? allFiles.filter(f => !f.isFolder).map(f => f.name) : selectedFiles;
            if (names.length < 2) return alert("Select at least 2 videos to merge!");
            
            if (confirm(`Merge ${names.length} videos in this specific order?`)) {
                try {
                    const res = await cloud._request('/api/video/merge', 'POST', { files: names });
                    alert(`Success! Merged video saved as: ${res.file}`);
                    clearSelection();
                    loadFiles();
                } catch (err) {
                    alert("Merge Failed: " + err.message);
                }
            }
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function closePreview() { 
            const body = document.getElementById('previewBody');
            if (window.player) { window.player.destroy(); window.player = null; }
            body.innerHTML = ''; 
            document.getElementById('previewModal').style.display = 'none'; 
        }

        async function startTranscode(name) {
            try {
                const res = await cloud.transcode(name, currentPath);
                alert("Processing started! This will take a few minutes. Look for the 'HLS' badge once completed.");
                loadFiles();
            } catch (err) { alert("Transcode failed: " + err.message); }
        }

        function openPreview(name) {
            const ext = name.split('.').pop().toLowerCase();
            const url = cloud.getViewUrl(name, inTrash?'.trash':currentPath);
            const body = document.getElementById('previewBody');
            const saveBtn = document.getElementById('saveBtn');
            const fileObj = allFiles.find(f => f.name === name);

            document.getElementById('previewTitle').innerText = name;
            body.innerHTML = 'Loading...'; saveBtn.style.display = 'none';

            // Clean up previous editing elements
            const oldBar = document.querySelector('.video-edit-bar');
            if (oldBar) oldBar.remove();

            if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) body.innerHTML = `<img src="${url}" alt="${name}">`;
            else if (['mp4', 'webm', 'mkv', 'mov'].includes(ext)) {
                body.innerHTML = `<video id="player" playsinline controls></video>`;
                const video = body.querySelector('#player');
                const hlsUrl = `${cloud.baseUrl}/view/${encodeURIComponent(name + '_hls/master.m3u8')}?path=${encodeURIComponent(currentPath)}&key=${cloud.apiKey}`;
                const subUrl = `${cloud.baseUrl}/view/${encodeURIComponent(name + '_hls/subtitles.vtt')}?path=${encodeURIComponent(currentPath)}&key=${cloud.apiKey}`;

                // 1. Initialize Plyr
                window.player = new Plyr(video, {
                    settings: ['quality', 'speed', 'loop', 'captions'],
                    quality: { default: 720, options: [4320, 2880, 2160, 1440, 1080, 720, 576, 480, 360, 240] },
                    speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
                });

                // 2. Initialize Hls.js or Native
                if (fileObj && fileObj.hasHLS && Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(hlsUrl);
                    hls.attachMedia(video);
                    window.hls = hls;

                        hls.on(Hls.Events.MANIFEST_PARSED, function () {
                            const availableQualities = hls.levels.map((l) => l.height);
                            window.player.config.quality.options = availableQualities;
                            window.player.quality = availableQualities[0]; 
                            window.player.on('qualitychange', (event) => {
                                const newQuality = event.detail.quality;
                                window.hls.levels.forEach((level, levelIndex) => {
                                    if (level.height === newQuality) window.hls.currentLevel = levelIndex;
                                });
                            });
                        });
                } else {
                    video.src = url;
                }

                // Load subtitles if they exist
                fetch(subUrl, { method: 'HEAD' }).then(res => {
                    if (res.ok) {
                        const track = document.createElement('track');
                        track.kind = 'captions';
                        track.label = 'English';
                        track.srclang = 'en';
                        track.src = subUrl;
                        video.appendChild(track);
                    }
                });

                // --- ADD VIDEO EDITING CONTROLS ---
                let inPos = null;
                let outPos = null;

                const editBar = document.createElement('div');
                editBar.className = 'video-edit-bar';
                editBar.innerHTML = `
                    <button class="edit-btn" id="seekBack10" title="-10 frames">⏪ -10f</button>
                    <button class="edit-btn" id="seekBack">⏪ -1f</button>
                    <button class="edit-btn" id="setIn" title="Set In Point">🚩 In: <span id="inVal">--</span></button>
                    <button class="edit-btn" id="setOut" title="Set Out Point">🏁 Out: <span id="outVal">--</span></button>
                    <button class="edit-btn save-copy-btn" id="cutVideoBtn">💾 Save Copy</button>
                    <button class="edit-btn" id="seekForward">+1f ⏩</button>
                    <button class="edit-btn" id="seekForward10" title="+10 frames">+10f ⏩</button>
                `;
                
                const previewContent = document.querySelector('.preview-content');
                previewContent.appendChild(editBar);

                const frameTime = 1 / 25;
                const tenFrames = 10 / 25;

                document.getElementById('seekBack10').onclick = () => { video.currentTime = Math.max(0, video.currentTime - tenFrames); };
                document.getElementById('seekBack').onclick = () => { video.currentTime = Math.max(0, video.currentTime - frameTime); };
                document.getElementById('seekForward').onclick = () => { video.currentTime = Math.min(video.duration, video.currentTime + frameTime); };
                document.getElementById('seekForward10').onclick = () => { video.currentTime = Math.min(video.duration, video.currentTime + tenFrames); };

                document.getElementById('setIn').onclick = () => {
                    inPos = video.currentTime;
                    document.getElementById('inVal').innerText = inPos.toFixed(2) + 's';
                    document.getElementById('setIn').classList.add('active');
                };

                document.getElementById('setOut').onclick = () => {
                    outPos = video.currentTime;
                    document.getElementById('outVal').innerText = outPos.toFixed(2) + 's';
                    document.getElementById('setOut').classList.add('active');
                };

                document.getElementById('cutVideoBtn').onclick = async () => {
                    if (inPos === null || outPos === null) return alert("Please set both In and Out points!");
                    const btn = document.getElementById('cutVideoBtn');
                    const oldText = btn.innerText;
                    btn.innerText = "⏳ Cutting...";
                    btn.disabled = true;

                    try {
                        const res = await cloud._request('/api/video/cut', 'POST', {
                            name,
                            path: currentPath,
                            startTime: inPos,
                            endTime: outPos
                        });
                        alert(`Success! Saved as: ${res.file}`);
                        closePreview();
                        loadFiles();
                    } catch (err) {
                        alert("Cut failed: " + err.message);
                    } finally {
                        btn.innerText = oldText;
                        btn.disabled = false;
                    }
                };
            }
            else if (ext === 'pdf') body.innerHTML = `<iframe src="${url}"></iframe>`;
            else if (['txt', 'js', 'html', 'css', 'json', 'md'].includes(ext)) {
                fetch(url).then(r => r.text()).then(text => { body.innerHTML = `<textarea id="textContent" style="width:100%; height:100%; background:#020617; color:#94a3b8; border:none; padding:20px; font-family:monospace; resize:none; outline:none; border-radius:8px;">${text}</textarea>`; saveBtn.style.display = 'block'; });
            }
            document.getElementById('previewModal').style.display = 'flex';
        }

        // Toggle logic for processing options
        document.getElementById('enableSizing').addEventListener('change', function() {
            document.getElementById('targetMb').disabled = !this.checked;
            document.getElementById('targetMb').style.opacity = this.checked ? "1" : "0.5";
        });
        document.getElementById('enableWatermark').addEventListener('change', function() {
            document.getElementById('watermarkText').disabled = !this.checked;
            document.getElementById('watermarkText').style.opacity = this.checked ? "1" : "0.5";
        });

        loadFiles();
    </script>
</body>
</html>
